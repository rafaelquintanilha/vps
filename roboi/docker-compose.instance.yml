services:
  opencode:
    image: ${ROBOI_IMAGE:?ROBOI_IMAGE is required}
    container_name: ${ROBOI_OPENCODE_CONTAINER:?ROBOI_OPENCODE_CONTAINER is required}
    restart: always
    command: bun run start:opencode
    working_dir: /app
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENCODE_SERVER_USERNAME=${ROBOI_OPENCODE_SERVER_USERNAME:-opencode}
      - OPENCODE_SERVER_PASSWORD=${ROBOI_OPENCODE_SERVER_PASSWORD:?ROBOI_OPENCODE_SERVER_PASSWORD is required}
      - ROBOI_DATALAKE_URL=${ROBOI_DATALAKE_URL:?ROBOI_DATALAKE_URL is required}
      - ROBOI_DATALAKE_DEFAULT_LIMIT=${ROBOI_DATALAKE_DEFAULT_LIMIT:-200}
      - ROBOI_DATALAKE_MAX_LIMIT=${ROBOI_DATALAKE_MAX_LIMIT:-1000}
      - ROBOI_DATALAKE_STATEMENT_TIMEOUT_MS=${ROBOI_DATALAKE_STATEMENT_TIMEOUT_MS:-15000}
      - ROBOI_DEFAULT_CLIENT_CODE=${ROBOI_DEFAULT_CLIENT_CODE:?ROBOI_DEFAULT_CLIENT_CODE is required}
      - TZ=${TIMEZONE:-UTC}
    volumes:
      - ${ROBOI_INSTANCE_DIR:?ROBOI_INSTANCE_DIR is required}/opencode:/root/.local/share/opencode
    networks:
      - web
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS -u \"$${OPENCODE_SERVER_USERNAME:-opencode}:$${OPENCODE_SERVER_PASSWORD}\" http://localhost:4096/session/status >/dev/null",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  api:
    image: ${ROBOI_IMAGE:?ROBOI_IMAGE is required}
    container_name: ${ROBOI_API_CONTAINER:?ROBOI_API_CONTAINER is required}
    restart: always
    command: bun run start:api
    working_dir: /app
    environment:
      - DATABASE_PATH=/data/roboi/roboi.db
      - PORT=3000
      - TZ=${TIMEZONE:-UTC}
    volumes:
      - ${ROBOI_INSTANCE_DIR:?ROBOI_INSTANCE_DIR is required}/data:/data/roboi
    networks:
      - web
    depends_on:
      - opencode
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  worker:
    image: ${ROBOI_IMAGE:?ROBOI_IMAGE is required}
    restart: always
    command: bun run start:worker
    working_dir: /app
    network_mode: "service:opencode"
    environment:
      - DATABASE_PATH=/data/roboi/roboi.db
      - OPENCODE_URL=http://127.0.0.1:4096
      - OPENCODE_SERVER_USERNAME=${ROBOI_OPENCODE_SERVER_USERNAME:-opencode}
      - OPENCODE_SERVER_PASSWORD=${ROBOI_OPENCODE_SERVER_PASSWORD:?ROBOI_OPENCODE_SERVER_PASSWORD is required}
      - POLL_INTERVAL_MS=${ROBOI_POLL_INTERVAL_MS:-2000}
      - WORKER_CONCURRENCY=${ROBOI_WORKER_CONCURRENCY:-3}
      - JOB_TIMEOUT_MS=${ROBOI_JOB_TIMEOUT_MS:-600000}
      - ROBOI_DATALAKE_URL=${ROBOI_DATALAKE_URL:?ROBOI_DATALAKE_URL is required}
      - ROBOI_DATALAKE_DEFAULT_LIMIT=${ROBOI_DATALAKE_DEFAULT_LIMIT:-200}
      - ROBOI_DATALAKE_MAX_LIMIT=${ROBOI_DATALAKE_MAX_LIMIT:-1000}
      - ROBOI_DATALAKE_STATEMENT_TIMEOUT_MS=${ROBOI_DATALAKE_STATEMENT_TIMEOUT_MS:-15000}
      - ROBOI_DEFAULT_CLIENT_CODE=${ROBOI_DEFAULT_CLIENT_CODE:?ROBOI_DEFAULT_CLIENT_CODE is required}
      - TZ=${TIMEZONE:-UTC}
    volumes:
      - ${ROBOI_INSTANCE_DIR:?ROBOI_INSTANCE_DIR is required}/data:/data/roboi
    depends_on:
      - opencode
      - api

  migrate:
    image: ${ROBOI_IMAGE:?ROBOI_IMAGE is required}
    command: bun run db:migrate
    working_dir: /app
    profiles:
      - manual
    environment:
      - DATABASE_PATH=/data/roboi/roboi.db
      - TZ=${TIMEZONE:-UTC}
    volumes:
      - ${ROBOI_INSTANCE_DIR:?ROBOI_INSTANCE_DIR is required}/data:/data/roboi
    networks:
      - web

networks:
  web:
    external: true
    name: ${ROBOI_DOCKER_NETWORK:-apps_web}
